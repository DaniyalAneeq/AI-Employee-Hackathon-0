[options]
; =============================================================================
; Odoo 17 Community — AI Employee Gold Tier Configuration
; This file is mounted read-only into the Odoo container
; =============================================================================

; Database connection (matches docker-compose.yml environment)
db_host = db
db_port = 5432
db_user = odoo
db_password = odoo_pass
db_maxconn = 64

; Odoo admin master password (used to create/drop databases via web UI)
admin_passwd = admin123

; Addons paths — built-in + custom
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons

; Data directory (filestore, sessions)
data_dir = /var/lib/odoo

; Server settings
xmlrpc_port = 8069
xmlrpc_interface =
longpolling_port = 8072

; Logging
logfile = /var/lib/odoo/odoo.log
log_level = warn
log_handler = :WARNING

; Performance
workers = 2
max_cron_threads = 1
limit_time_cpu = 600
limit_time_real = 1200

; Security
list_db = True
proxy_mode = False
